version: '3.8'

services:
  app:
    build: .
    container_name: enkrix_app
    restart: unless-stopped
    ports:
      - "8087:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY}
    networks:
      - enkrix_network

  db:
    image: mysql:8.0
    container_name: enkrix_db
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - enkrix_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: enkrix_phpmyadmin
    restart: unless-stopped
    ports:
      - "8086:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      PMA_ARBITRARY: 0
    depends_on:
      - db
    networks:
      - enkrix_network

volumes:
  db_data:
    driver: local

networks:
  enkrix_network:
    driver: bridge
